graph-file: "inputs/task_graph_topology/custom/paper_fig3_11node.dot"
area-constraint: 0.5
hw-scale-factor: 1.0
hw-scale-variance: 0.1
comm-scale-factor: 1.0
seed: 42
solver-tool: "cvxpy"

solution-dir: "outputs/fig3_partitions_all_methods_small"
result-file-prefix: "fig3_all_methods_small"
output-dir: "outputs/all_methods_fig3_small"
taskgraph-dir: "inputs/task_graph_complete"
taskgraph-pickle: "inputs/task_graph_complete/taskgraph-paper_fig3_11node-instance-config-config_fig3_taskgraph_gnn.pkl"

methods: "random,greedy,diff_gnn,diff_gnn_order,gcps,pso,dbpso,clpso,ccpso,esa,shade,jade,gl25"
opt-cost-type: "makespan"

visualization:
  enabled: false

random:
  num_samples: 300
  p: 0.5

pso:
  c1: 1.5
  c2: 1.5
  w: 0.7
  n_particles: 20
  iterations: 30
  verbose: false

dbpso:
  c1: 1.5
  c2: 1.5
  w: 0.7
  k: 5
  p: 2
  n_particles: 20
  iterations: 30
  verbose: false

clpso:
  iterations: 400
  n_individuals: 30
  c: 1.49618

ccpso:
  iterations: 400
  n_individuals: 30
  c: 1.49618
  group_sizes: [2, 3]

esa:
  iter: 600

shade:
  iter: 600
  n_individuals: 30

jade:
  iter: 600
  n_individuals: 30

gl25:
  iter: 800
  n_pop: 60
  verbose: 0

gcps:
  iter: 300
  pretrain_iter: 80
  schedule_eval: "lssp"
  quick_search: true
  device: "cpu"
  verbose: 0

diffgnn:
  iter: 140
  hidden_dim: 128
  num_layers: 3
  dropout: 0.2
  model: "default"
  device: "cpu"
  speed_patch: true
  feature_profile: "default_plus_paper"
  edge_weight_mode: "paper2_cosine"
  edge_weight_learner: "mlp"
  edge_mlp_hidden_dim: 16
  edge_weight_min_scale: 0.5
  edge_weight_max_scale: 1.5
  hard_eval_every: 20
  hard_eval_only_final: true
  selection_metric: "queue"
  selection_metric_train: "queue"
  selection_metric_final: "queue"
  final_legacy_lp_if_mip: true
  reuse_trained_final_cost: true
  decode_speedup_weight: 0.45
  entropy_coeff: 0.0
  usage_balance_coeff: 0.0
  partition_cost_coeff: 0.01
  postprocess:
    mode: "hybrid"
    during_train: false
    eval_mode: "lssp"
    max_iters: 100
    enable_area_fill: true
    fill_allow_worsen: 0.0
    enable_swap: true
    dls_steps: 2
    dls_flip_eta: 0.35
    dls_swap_eta: 0.18
    dls_score_temp: 0.70
    dls_comm_coeff: 0.02
    dls_area_proj_iters: 4
    dls_area_proj_strength: 6.0
    dls_fill_decode: true

