graph-file: "inputs/task_graph_topology/soda-benchmark-graphs/pytorch-graphs/squeeze_net_tosa.dot"
area-constraint: 0.5
hw-scale-factor: 0.1
hw-scale-variance: 0.5
comm-scale-factor: 1.0
seed: 42
solver-tool: "cvxpy"

solution-dir: "outputs/iccad_pilot_squeeze_partitions"
result-file-prefix: "iccad_pilot_squeeze"
output-dir: "outputs/iccad_pilot_squeeze"
taskgraph-dir: "inputs/task_graph_complete"
taskgraph-pickle: "inputs/task_graph_complete/taskgraph-squeeze_net_tosa-instance-config-config_mkspan_default_gnn.pkl"

methods: "random,greedy,diff_gnn,diff_gnn_order,gcps,pso,dbpso,clpso,ccpso,esa,shade,jade,gl25"
opt-cost-type: "makespan"

visualization:
  enabled: false

random:
  num_samples: 50
  p: 0.5

pso:
  c1: 0.575
  c2: 0.1
  w: 1.05
  n_particles: 10
  iterations: 4
  verbose: false

dbpso:
  c1: 0.575
  c2: 0.1
  w: 1.05
  k: 4
  p: 2
  n_particles: 10
  iterations: 4
  verbose: false

clpso:
  c: 1.0
  n_individuals: 12
  iterations: 15
  verbose: 0

ccpso:
  c: 1.0
  n_individuals: 12
  iterations: 15
  group_sizes: [5, 10]
  verbose: 0

esa:
  iter: 60
  verbose: 0

shade:
  iter: 60
  n_individuals: 12
  verbose: 0

jade:
  iter: 60
  n_individuals: 12
  verbose: 0

gl25:
  iter: 60
  n_pop: 12
  verbose: 0

gcps:
  iter: 40
  pretrain_iter: 10
  schedule_eval: "lssp"
  quick_search: true
  device: "cpu"
  verbose: 0

diffgnn:
  iter: 10
  hidden_dim: 64
  num_layers: 3
  dropout: 0.2
  model: "default"
  device: "cpu"
  speed_patch: true
  feature_profile: "default_plus_paper"
  edge_weight_mode: "paper2_cosine"
  edge_weight_learner: "mlp"
  edge_mlp_hidden_dim: 16
  edge_weight_min_scale: 0.5
  edge_weight_max_scale: 1.5
  hard_eval_every: 5
  hard_eval_only_final: true
  selection_metric: "queue"
  selection_metric_train: "queue"
  selection_metric_final: "queue"
  final_legacy_lp_if_mip: true
  reuse_trained_final_cost: true
  decode_speedup_weight: 0.45
  entropy_coeff: 0.0
  usage_balance_coeff: 0.0
  partition_cost_coeff: 0.0833333333
  postprocess:
    mode: "hybrid"
    during_train: false
    eval_mode: "lssp"
    max_iters: 20
    enable_area_fill: true
    fill_allow_worsen: 0.0
    enable_swap: true
    dls_steps: 2
    dls_flip_eta: 0.35
    dls_swap_eta: 0.18
    dls_score_temp: 0.70
    dls_comm_coeff: 0.02
    dls_area_proj_iters: 4
    dls_area_proj_strength: 6.0
    dls_fill_decode: true

