graph-file: inputs/task_graph_topology/soda-benchmark-graphs/tflite-graphs/image_classification_tosa.dot
area-constraint: 0.5
hw-scale-factor: 0.1
hw-scale-variance: 0.5
comm-scale-factor: 1.0
seed: 44
solver-tool: cvxpy
solution-dir: outputs/task_graph_topology_suite_area05/pilot/partitions
result-file-prefix: task_graph_topology_suite_area05_pilot
output-dir: outputs/task_graph_topology_suite_area05/pilot
taskgraph-dir: inputs/task_graph_complete
taskgraph-pickle: inputs/task_graph_complete/taskgraph-image_classification_tosa_area-0.50_hwscale-0.10_hwvar-0.50_comm-1.00_seed-44.pkl
opt-cost-type: makespan
mip:
  solve-mode: hybrid
  sw-constraint-mode: adjacent
  use-reduced-sw-constraints: true
  round-threshold: 0.5
  verbose: false
  preferred-solvers:
  - HIGHS
  - GUROBI
  - SCIP
  - GLPK_MI
  - CBC
  - ECOS_BB
  time-limit-sec: 30
  mip-gap: 0.15
  node-limit: 20000
  accept-nonoptimal: true
visualization:
  enabled: false
  include_input_graph: false
  include_output_schedule: false
  out_dir: outputs/task_graph_topology_suite_area05/pilot/visualizations
  input_dir: outputs/task_graph_topology_suite_area05/pilot/visualizations/input
  schedule_dir: outputs/task_graph_topology_suite_area05/pilot/visualizations/schedule
  strict_partitions: false
random:
  num_samples: 50
  p: 0.5
pso:
  c1: 0.575
  c2: 0.1
  w: 1.05
  n_particles: 10
  iterations: 4
  verbose: 0
dbpso:
  c1: 0.575
  c2: 0.1
  w: 1.05
  k: 4
  p: 2
  n_particles: 10
  iterations: 4
  verbose: 0
clpso:
  c: 1
  n_individuals: 12
  iterations: 15
  verbose: 0
ccpso:
  c: 1
  n_individuals: 12
  verbose: 0
  iterations: 15
  group_sizes:
  - 5
  - 10
  - 20
gl25:
  iter: 60
  n_pop: 12
  verbose: 0
shade:
  iter: 60
  n_individuals: 12
  verbose: 0
jade:
  iter: 60
  n_individuals: 12
  verbose: 0
esa:
  iter: 60
  verbose: 0
non_diffgnn:
  iter: 500
  verbose: 500
diffgnn:
  iter: 10
  verbose: 1000
  device: cpu
  hidden_dim: 64
  num_layers: 3
  dropout: 0.2
  model: default
  selection_metric: queue
  selection_metric_train: queue
  selection_metric_final: queue
  final_legacy_lp_if_mip: true
  reuse_trained_final_cost: true
  speed_patch: true
  hard_eval_every: 5
  hard_eval_only_final: true
  checkpoint_eval_when_final_only: true
  entropy_coeff: 0.0
  usage_balance_coeff: 0.0
  partition_cost_coeff: 0.0833333333
  postprocess:
    mode: hybrid
    during_train: false
    eval_mode: lssp
    max_iters: 20
    adaptive_max_iters: false
    adaptive_large_n: 128
    adaptive_large_cap: 10
    enable_area_fill: true
    fill_allow_worsen: 0.0
    enable_swap: true
    dls_steps: 2
    dls_flip_eta: 0.35
    dls_swap_eta: 0.18
    dls_score_temp: 0.7
    dls_comm_coeff: 0.02
    dls_area_proj_iters: 4
    dls_area_proj_strength: 6.0
    dls_fill_decode: true
  feature_profile: default_plus_paper
  edge_weight_mode: paper2_cosine
  edge_weight_learner: mlp
  sinkhorn_iters: 12
  pairwise_temp: 0.35
  edge_mlp_hidden_dim: 16
  edge_weight_min_scale: 0.5
  edge_weight_max_scale: 1.5
  decode_speedup_weight: 0.45
gcon:
  iter: 500
  verbose: 500
  device: gpu
methods:
- random
- greedy
- diff_gnn
- diff_gnn_order
- gcps
- pso
- dbpso
- clpso
- ccpso
- esa
- shade
- jade
- gl25
gcps:
  iter: 40
  pretrain_iter: 10
  schedule_eval: lssp
  quick_search: true
  device: cpu
  verbose: 0
  lr: 0.001
  dropout: 0.2
  hidden_dim_1: 10
  hidden_dim_2: 5
  schedule_skip: 5
  sigma: 0.3
