graph-file: inputs/task_graph_topology/synthetic/squeezenet_like_1000.dot
area-constraint: 0.5
hw-scale-factor: 0.1
hw-scale-variance: 0.5
comm-scale-factor: 1.0
seed: 44
solver-tool: cvxpy
solution-dir: outputs/task_graph_topology_suite_area05/full/partitions
result-file-prefix: task_graph_topology_suite_area05_full
output-dir: outputs/task_graph_topology_suite_area05/full
taskgraph-dir: inputs/task_graph_complete
taskgraph-pickle: inputs/task_graph_complete/taskgraph-squeezenet_like_1000_area-0.50_hwscale-0.10_hwvar-0.50_comm-1.00_seed-44.pkl
opt-cost-type: makespan
mip:
  solve-mode: hybrid
  sw-constraint-mode: adjacent
  use-reduced-sw-constraints: true
  round-threshold: 0.5
  verbose: false
  preferred-solvers:
  - HIGHS
  - GUROBI
  - SCIP
  - GLPK_MI
  - CBC
  - ECOS_BB
  time-limit-sec: 30
  mip-gap: 0.15
  node-limit: 20000
  accept-nonoptimal: true
visualization:
  enabled: false
  include_input_graph: false
  include_output_schedule: false
  out_dir: outputs/task_graph_topology_suite_area05/full/visualizations
  input_dir: outputs/task_graph_topology_suite_area05/full/visualizations/input
  schedule_dir: outputs/task_graph_topology_suite_area05/full/visualizations/schedule
  strict_partitions: false
random:
  num_samples: 500
  p: 0.5
pso:
  c1: 0.575
  c2: 0.1
  w: 1.05
  n_particles: 500
  iterations: 10
  verbose: true
dbpso:
  c1: 0.575
  c2: 0.1
  w: 1.05
  k: 4
  p: 2
  n_particles: 500
  iterations: 10
  verbose: true
clpso:
  c: 1
  n_individuals: 500
  iterations: 200
  verbose: 500
ccpso:
  c: 1
  n_individuals: 500
  verbose: 500
  iterations: 200
  group_sizes:
  - 5
  - 10
  - 20
gl25:
  iter: 2000
  n_pop: 500
  verbose: 500
shade:
  iter: 2000
  n_individuals: 500
  verbose: 500
jade:
  iter: 2000
  n_individuals: 500
  verbose: 500
esa:
  iter: 1000
  verbose: 500
non_diffgnn:
  iter: 500
  verbose: 500
diffgnn:
  iter: 1000
  verbose: 1000
  device: gpu
  hidden_dim: 256
  num_layers: 3
  dropout: 0.2
  model: default
  selection_metric: queue
  selection_metric_train: queue
  selection_metric_final: queue
  final_legacy_lp_if_mip: true
  reuse_trained_final_cost: true
  speed_patch: true
  hard_eval_every: 100
  hard_eval_only_final: true
  checkpoint_eval_when_final_only: true
  entropy_coeff: 0.0
  usage_balance_coeff: 0.0
  partition_cost_coeff: 0.0833333333
  postprocess:
    mode: hybrid
    during_train: false
    eval_mode: lssp
    max_iters: 120
    adaptive_max_iters: false
    adaptive_large_n: 128
    adaptive_large_cap: 10
    enable_area_fill: true
    fill_allow_worsen: 0.0
    enable_swap: true
    dls_steps: 2
    dls_flip_eta: 0.35
    dls_swap_eta: 0.18
    dls_score_temp: 0.7
    dls_comm_coeff: 0.02
    dls_area_proj_iters: 4
    dls_area_proj_strength: 6.0
    dls_fill_decode: true
  feature_profile: default_plus_paper
  edge_weight_mode: paper2_cosine
  edge_weight_learner: mlp
  sinkhorn_iters: 12
  pairwise_temp: 0.35
gcon:
  iter: 500
  verbose: 500
  device: gpu
methods:
- random
- greedy
- diff_gnn
- diff_gnn_order
- gcps
- pso
- dbpso
- clpso
- ccpso
- esa
- shade
- jade
- gl25
gcps: {}
